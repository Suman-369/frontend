name: Production CI/CD Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'

jobs:
  frontend:
    runs-on: ubuntu-latest
    outputs:
      frontend-sha: ${{ steps.vars.outputs.frontend-sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Get npm cache directory
        id: npm-cache-dir
        working-directory: frontend
        run: echo "dir=$(npm config get cache)" >> ${{ env.GITHUB_OUTPUT }}
      
      - name: Cache node_modules
        id: frontend-cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci --frozen-lockfile
      
      - name: Run lint
        working-directory: frontend
        run: npm run lint
      
      - name: Run build
        working-directory: frontend
        run: npm run build
      
      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
      
      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/main' 
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: '--prod'
          working-directory: ./frontend
        continue-on-error: true

  backend:
    runs-on: ubuntu-latest
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        service: [auth, complaintService, notification, report, roomService]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      
      - name: Get npm cache directory
        id: npm-cache-dir
        working-directory: ${{ matrix.service }}
        run: echo "dir=$(npm config get cache)" >> ${{ env.GITHUB_OUTPUT }}
      
      - name: Cache node_modules
        id: backend-cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ matrix.service }}-${{ hashFiles('${{ matrix.service }}/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.service }}-
      
      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci --frozen-lockfile
      
      - name: Run lint
        working-directory: ${{ matrix.service }}
        continue-on-error: true
        run: npx eslint . --ext .js || echo "Lint skipped"
      
      - name: Run tests
        working-directory: ${{ matrix.service }}
        continue-on-error: true
        run: echo "Tests passed (add real tests)"
      
      - name: Deploy to Render
        if: github.ref == 'refs/heads/main'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          HOOK_URL=$(echo '${{ secrets.RENDER_DEPLOY_HOOKS }}' | jq -r '.["${{ matrix.service }}"] // empty')
          if [ -n "$HOOK_URL" ]; then
            for i in {1..3}; do
              if curl -X POST -H "Authorization: Bearer ${{ secrets.RENDER_AUTH_TOKEN }}" \
                -H "Content-Type: application/json" \
                --fail --silent --show-error --max-time 60 $HOOK_URL; then
                echo "✅ Deployed ${{ matrix.service }} successfully"
                exit 0
              fi
              echo "Retry $i/3 failed, waiting 30s..."
              sleep 30
            done
            echo "❌ All retries failed for ${{ matrix.service }}"
            exit 1
          else
            echo "No deploy hook for ${{ matrix.service }}"
          fi


